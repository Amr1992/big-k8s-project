name: CI/CD - Build and Deploy Node App

on:
  push:
    branches:
      - main
    paths:
      - "node-app/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: big-k8s-project-rg
      IMAGE_NAME: node-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Discover ACR
        run: |
          ACR_NAME=$(az acr list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[0].name" \
            --output tsv)

          if [ -z "$ACR_NAME" ]; then
            echo "No ACR found in resource group $RESOURCE_GROUP"
            exit 1
          fi

          ACR_LOGIN_SERVER=$(az acr show \
            --name "$ACR_NAME" \
            --query "loginServer" \
            --output tsv)

          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV

      - name: Login to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Set image tag
        run: echo "IMAGE_TAG=v${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t ${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG} \
            ./node-app

      - name: Push Docker image
        run: |
          docker push ${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}

      - name: Update Helm chart image repository and tag
        run: |
          sed -i "s|repository: .*|repository: ${ACR_LOGIN_SERVER}/${IMAGE_NAME}|g" node-app-chart/values.yaml
          sed -i "s|tag: .*|tag: ${IMAGE_TAG}|g" node-app-chart/values.yaml

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add node-app-chart/values.yaml
          git diff --cached --quiet || git commit -m "Update image tag to ${IMAGE_TAG}"
          git push